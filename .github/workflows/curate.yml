name: Persona Founder Curator

on:
  schedule:
    - cron: '0 0 * * *' 
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
        contents: write    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # This ensures the action has the right permissions to push
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install google-genai feedparser

      - name: Run Curator
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python curate_founders.py

      - name: Commit and Push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          # Catch all JSON files (founder, summary, and older articles)
          git add *.json 
          # Only commit if there are actually changes
          if git diff --quiet && git diff --staged --quiet; then
            echo "✅ No new articles found today."
          else
            git commit -m "Automated: Updated Founder Feed & Archive"
            git push
          fi
